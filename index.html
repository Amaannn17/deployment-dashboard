<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chronos Deployment Dashboard</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#121212">
    <link rel="apple-touch-icon" href="icon.png">

    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        :root {
            --bg-dark: #121212;
            --surface: #1e1e1e;
            --surface-light: #2c2c2c;
            --text-primary: #f5f5f5;
            --text-secondary: #a0a0a0;
            --danger: #ff5252;
            --border: #333333;
            --card-bg: #1a1a1a;
            
            /* System Color Themes */
            --c-lighting: #ffeb3b;   /* Yellow */
            --c-it: #2979ff;         /* Blue */
            --c-automation: #d500f9; /* Purple */
            --c-av: #ff1744;         /* Red/Pink */
            --c-bms: #00e676;        /* Green */
            --c-rem: #333333;        /* Dark Grey for Remaining */
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-primary);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }

        .controls { display: flex; gap: 10px; }

        .dashboard-container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 20px;
        }

        .chart-card {
            background-color: var(--surface);
            padding: 20px;
            border-radius: 8px;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 320px;
        }

        .upload-card {
            background-color: var(--surface);
            padding: 20px;
            border-radius: 8px;
            border: 1px solid var(--border);
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        /* View & System Selector Bar */
        .view-control-bar {
            background-color: var(--surface);
            border: 1px solid var(--border);
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
            transition: border-color 0.3s ease;
        }

        .table-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }

        .table-card h3 {
            margin-top: 0;
            border-bottom: 1px solid var(--border);
            padding-bottom: 10px;
            margin-bottom: 15px;
            font-size: 1.2rem;
            display: flex;
            justify-content: space-between;
            transition: color 0.3s ease;
        }

        input[type="file"]::file-selector-button, select, button {
            background-color: var(--surface-light);
            color: var(--text-primary);
            border: 1px solid var(--border);
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
            outline: none;
        }

        select { padding: 9px; font-size: 1rem; }
        
        button.primary { border: none; color: #121212; }
        button.danger { background-color: transparent; color: var(--danger); border-color: var(--danger); }
        button:hover { opacity: 0.8; transform: translateY(-1px); }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }

        th, td { padding: 12px 10px; text-align: left; border-bottom: 1px solid var(--border); }
        th { color: var(--text-secondary); text-transform: uppercase; font-size: 0.8rem; white-space: nowrap;}
        
        .stage-val { font-weight: bold; font-size: 1rem; }
        .rem-val { color: var(--text-primary); }
        .completed-row { opacity: 0.4; }

        .input-group { display: flex; align-items: center; gap: 8px; }
        
        input[type="number"] {
            background-color: var(--bg-dark);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 8px;
            border-radius: 4px;
            width: 80px;
        }
        
        /* Progress Bar in Table */
        .progress-container {
            width: 100px;
            background-color: var(--bg-dark);
            border-radius: 4px;
            height: 6px;
            margin-top: 5px;
            overflow: hidden;
            border: 1px solid var(--border);
        }
        .progress-bar { height: 100%; transition: width 0.4s ease; }

        optgroup { color: var(--text-secondary); font-style: normal; font-weight: bold; }
        option { color: var(--text-primary); }
    </style>
</head>
<body>

    <div class="header">
        <div>
            <h2 style="margin: 0;">Chronos Master Dashboard</h2>
            <p style="color: var(--text-secondary); margin-top: 5px;">Multi-Discipline Project Tracking</p>
        </div>
        <div class="controls">
            <button class="primary" style="background-color: #f5f5f5;" onclick="exportReport()" id="exportBtn" style="display: none;">Export Excel Report</button>
            <button class="danger" onclick="clearData()" id="clearBtn" style="display: none;">Reset Project</button>
        </div>
    </div>

    <div class="dashboard-container" id="dashboardContainer" style="display: none;">
        <div class="chart-card">
            <h3 style="margin: 0 0 10px 0; color: var(--text-primary); font-size: 1rem;">Project Completion by System</h3>
            <canvas id="chart-overall"></canvas>
        </div>
        
        <div class="upload-card">
            <h3 style="margin-top: 0; color: var(--text-primary);">Add Equipment (BOM)</h3>
            <div style="display: flex; gap: 15px; align-items: center; flex-wrap: wrap;">
                <select id="uploadTargetSystem">
                    <option value="lighting">Lighting</option>
                    <optgroup label="Structured Cabling">
                        <option value="it">↳ IT</option>
                        <option value="automation">↳ Automation</option>
                        <option value="av">↳ AV</option>
                    </optgroup>
                    <option value="bms">BMS</option>
                </select>
                <input type="file" id="excelUpload" accept=".xlsx, .xls, .csv" />
            </div>
            <p style="color: var(--text-secondary); font-size: 0.85rem; margin-bottom: 0; margin-top: 15px;">Select the target system discipline, then upload the Excel file.</p>
        </div>
    </div>

    <div class="upload-card" id="initialUpload">
        <h3 style="margin-top: 0;">Initialize Project</h3>
        <div style="display: flex; gap: 15px; align-items: center; flex-wrap: wrap;">
            <select id="uploadTargetSystemInitial">
                <option value="lighting">Lighting</option>
                <optgroup label="Structured Cabling">
                    <option value="it">↳ IT</option>
                    <option value="automation">↳ Automation</option>
                    <option value="av">↳ AV</option>
                </optgroup>
                <option value="bms">BMS</option>
            </select>
            <input type="file" id="excelUploadInitial" accept=".xlsx, .xls, .csv" />
        </div>
    </div>

    <div class="view-control-bar" id="viewControlBar" style="display: none;">
        <span style="font-size: 1.1rem; font-weight: bold; color: var(--text-secondary);">Active View:</span>
        
        <select id="activeSystemSelector" onchange="onSystemChange()">
            <option value="lighting">1. Lighting</option>
            <optgroup label="2. Structured Cabling">
                <option value="it">↳ IT</option>
                <option value="automation">↳ Automation</option>
                <option value="av">↳ AV</option>
            </optgroup>
            <option value="bms">3. BMS</option>
        </select>

        <span style="color: var(--border);">|</span>

        <select id="activePhaseSelector" onchange="renderActiveTable()">
            </select>
    </div>

    <div id="tableContainer"></div>

    <script>
        let projectData = { lighting: {}, it: {}, automation: {}, av: {}, bms: {} };
        let overallChartInstance = null;

        // Color Themes matching the Pie Chart slices
        const systemColors = {
            lighting: 'var(--c-lighting)',
            it: 'var(--c-it)',
            automation: 'var(--c-automation)',
            av: 'var(--c-av)',
            bms: 'var(--c-bms)'
        };

        // Distinct Phase Configurations
        const phaseConfig = {
            lighting: {
                pulling: { text: '1. Cable Pulling', w: 0.3 },
                termination: { text: '2. Termination', w: 0.3 },
                installation: { text: '3. Installation', w: 0.3 },
                commissioning: { text: '4. Commissioning', w: 0.1 }
            },
            other: {
                pulling: { text: '1. Cable Pulling', w: 0.3 },
                termination: { text: '2. Termination', w: 0.3 },
                commissioning: { text: '3. Testing & Commissioning', w: 0.3 },
                drivers: { text: '4. Install Drivers', w: 0.1 }
            }
        };

        const formatNum = (num) => parseFloat(Number(num).toFixed(2));

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(()=>{}));
        }

        window.addEventListener('DOMContentLoaded', () => {
            const savedData = localStorage.getItem('deploymentTrackerData');
            if (savedData) {
                projectData = JSON.parse(savedData);
                renderUI();
            }
        });

        function saveData() { localStorage.setItem('deploymentTrackerData', JSON.stringify(projectData)); }

        document.getElementById('excelUpload').addEventListener('change', handleUpload);
        document.getElementById('excelUploadInitial').addEventListener('change', handleUpload);

        function handleUpload(e) {
            const file = e.target.files[0];
            if (!file) return;

            const targetSystem = e.target.id === 'excelUploadInitial' 
                ? document.getElementById('uploadTargetSystemInitial').value 
                : document.getElementById('uploadTargetSystem').value;

            const reader = new FileReader();
            reader.onload = function(event) {
                const data = new Uint8Array(event.target.result);
                const workbook = XLSX.read(data, {type: 'array'});
                const jsonData = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
                
                processData(jsonData, targetSystem);
                
                document.getElementById('excelUpload').value = '';
                document.getElementById('excelUploadInitial').value = '';
                
                document.getElementById('activeSystemSelector').value = targetSystem;
                onSystemChange(); 
            };
            reader.readAsArrayBuffer(file);
        }

        function processData(data, targetSystem) {
            if (!projectData[targetSystem]) projectData[targetSystem] = {};

            data.forEach(row => {
                let normalizedRow = {};
                for (let key in row) { normalizedRow[key.toLowerCase().trim()] = row[key]; }

                let model = normalizedRow['fixture reference'] || normalizedRow['future reference'] || 
                            normalizedRow['model number'] || normalizedRow['model number/future reference'] || 
                            normalizedRow['model'];
                let qty = parseFloat(normalizedRow['quantity'] || normalizedRow['qty']);
                let unit = normalizedRow['unit'] || normalizedRow['uom'] || "ea";

                if (model && !isNaN(qty)) {
                    model = String(model).trim();
                    qty = formatNum(qty); 

                    if (!projectData[targetSystem][model]) {
                        projectData[targetSystem][model] = { 
                            quantity: 0, 
                            unit: unit, 
                            stages: {} 
                        };
                    }
                    projectData[targetSystem][model].quantity = formatNum(projectData[targetSystem][model].quantity + qty);
                }
            });
            saveData();
        }

        Chart.register({
            id: 'centerText',
            beforeDraw: function(chart) {
                if (chart.config.options.elements && chart.config.options.elements.center) {
                    const ctx = chart.ctx;
                    const centerConfig = chart.config.options.elements.center;
                    ctx.save();
                    const fontSize = (chart.height / 114).toFixed(2);
                    ctx.font = "bold " + fontSize + "em sans-serif";
                    ctx.textBaseline = "middle";
                    ctx.fillStyle = "#ffffff";
                    const text = centerConfig.text;
                    const textX = Math.round((chart.width - ctx.measureText(text).width) / 2);
                    const textY = chart.height / 2;
                    ctx.fillText(text, textX, textY);
                    ctx.restore();
                }
            }
        });

        function updateMasterChart() {
            let stats = { lighting: 0, it: 0, automation: 0, av: 0, bms: 0 };
            let totalPossible = 0;

            for (let sys in projectData) {
                let activeConf = sys === 'lighting' ? phaseConfig.lighting : phaseConfig.other;
                for (let item of Object.values(projectData[sys])) {
                    totalPossible += item.quantity;
                    let itemDone = 0;
                    for (let p in activeConf) {
                        let val = item.stages[p] || 0;
                        itemDone += val * activeConf[p].w;
                    }
                    stats[sys] += itemDone;
                }
            }

            let totalDone = stats.lighting + stats.it + stats.automation + stats.av + stats.bms;
            let remaining = formatNum(totalPossible - totalDone);
            if (remaining < 0) remaining = 0;

            const percentStr = totalPossible > 0 ? ((totalDone / totalPossible) * 100).toFixed(1) + '%' : '0%';
            
            const hexColors = ['#ffeb3b', '#2979ff', '#d500f9', '#ff1744', '#00e676', '#333333'];

            if (overallChartInstance) {
                overallChartInstance.data.datasets[0].data = [
                    formatNum(stats.lighting), formatNum(stats.it), formatNum(stats.automation), 
                    formatNum(stats.av), formatNum(stats.bms), remaining
                ];
                overallChartInstance.options.elements.center.text = percentStr;
                overallChartInstance.update();
            } else {
                const ctx = document.getElementById('chart-overall').getContext('2d');
                overallChartInstance = new Chart(ctx, {
                    type: 'doughnut',
                    data: {
                        labels: ['Lighting', 'IT', 'Automation', 'AV', 'BMS', 'Remaining Data'],
                        datasets: [{ 
                            data: [
                                formatNum(stats.lighting), formatNum(stats.it), formatNum(stats.automation), 
                                formatNum(stats.av), formatNum(stats.bms), remaining
                            ], 
                            backgroundColor: hexColors, 
                            borderWidth: 0 
                        }]
                    },
                    options: {
                        responsive: true,
                        cutout: '75%',
                        plugins: { 
                            legend: { display: true, position: 'bottom', labels: { color: '#f5f5f5', padding: 15, font: {size: 11} } }, 
                            tooltip: { enabled: true } 
                        },
                        elements: { center: { text: percentStr } }
                    }
                });
            }
        }

        function hasAnyData() {
            for (let sys in projectData) {
                if (Object.keys(projectData[sys]).length > 0) return true;
            }
            return false;
        }

        function onSystemChange() {
            const sysSelector = document.getElementById('activeSystemSelector');
            const phaseSelector = document.getElementById('activePhaseSelector');
            const activeSystemId = sysSelector.value;
            
            const currentPhaseVal = phaseSelector.value;
            const activeConf = activeSystemId === 'lighting' ? phaseConfig.lighting : phaseConfig.other;
            
            phaseSelector.innerHTML = '';
            for (let key in activeConf) {
                let opt = document.createElement('option');
                opt.value = key;
                // Populating dropdown text without the percentage
                opt.textContent = activeConf[key].text;
                phaseSelector.appendChild(opt);
            }
            
            if (activeConf[currentPhaseVal]) phaseSelector.value = currentPhaseVal;
            else phaseSelector.value = 'pulling';

            document.getElementById('viewControlBar').style.borderColor = systemColors[activeSystemId];
            sysSelector.style.color = systemColors[activeSystemId];

            renderActiveTable();
        }

        function renderUI() {
            const hasData = hasAnyData();
            
            document.getElementById('initialUpload').style.display = hasData ? 'none' : 'block';
            document.getElementById('dashboardContainer').style.display = hasData ? 'flex' : 'none';
            document.getElementById('viewControlBar').style.display = hasData ? 'flex' : 'none';
            document.getElementById('exportBtn').style.display = hasData ? 'block' : 'none';
            document.getElementById('clearBtn').style.display = hasData ? 'block' : 'none';
            
            if (hasData) {
                updateMasterChart();
                onSystemChange(); 
            } else {
                document.getElementById('tableContainer').innerHTML = '';
            }
        }

        function renderActiveTable() {
            const container = document.getElementById('tableContainer');
            
            const sysSelector = document.getElementById('activeSystemSelector');
            const phaseSelector = document.getElementById('activePhaseSelector');
            
            const activeSystemId = sysSelector.value;
            const activeSystemTitle = sysSelector.options[sysSelector.selectedIndex].text.replace(/↳ |[0-9]\. /g, '');
            
            const activePhaseId = phaseSelector.value;
            // No split needed now since percentage is removed from dropdown
            const activePhaseTitle = phaseSelector.options[phaseSelector.selectedIndex].text;
            
            const activeColor = systemColors[activeSystemId];
            const activeData = projectData[activeSystemId] || {};

            let tableHTML = `
                <div class="table-card" style="border-top: 3px solid ${activeColor}">
                    <h3 style="color: ${activeColor}">
                        <span>${activeSystemTitle}</span>
                        <span style="color: var(--text-secondary); font-size: 0.9rem; align-self: flex-end; font-weight: normal;">Viewing: ${activePhaseTitle}</span>
                    </h3>
                    <div style="overflow-x: auto;">
                        <table>
                            <thead>
                                <tr>
                                    <th>Fixture / Model Ref</th>
                                    <th>Quantity</th>
                                    <th>Unit</th>
                                    <th>Workdone</th>
                                    <th>Remaining</th>
                                    <th>Progress</th>
                                    <th>Log (±)</th>
                                </tr>
                            </thead>
                            <tbody>
            `;

            if (Object.keys(activeData).length === 0) {
                tableHTML += `<tr><td colspan="7" style="text-align:center; padding: 30px; color: var(--text-secondary)">No equipment loaded for ${activeSystemTitle} yet. Upload a BOM above.</td></tr>`;
            } else {
                for (const [model, item] of Object.entries(activeData)) {
                    let qty = formatNum(item.quantity);
                    let done = formatNum(item.stages[activePhaseId] || 0);
                    let remaining = formatNum(qty - done);
                    
                    let isComplete = remaining <= 0;
                    let progressPercent = qty > 0 ? Math.min(((done / qty) * 100), 100).toFixed(0) : 0;

                    tableHTML += `
                        <tr class="${isComplete ? 'completed-row' : ''}">
                            <td style="font-weight: 500;">${model}</td>
                            <td>${qty}</td>
                            <td style="color: var(--text-secondary);">${item.unit}</td>
                            <td class="stage-val" style="color: ${activeColor}">${done}</td>
                            <td class="rem-val">${remaining}</td>
                            <td>
                                <span style="font-size: 0.8rem; font-weight: bold;">${progressPercent}%</span>
                                <div class="progress-container">
                                    <div class="progress-bar" style="width: ${progressPercent}%; background-color: ${activeColor};"></div>
                                </div>
                            </td>
                            <td>
                                <div class="input-group">
                                    <input type="number" step="0.01" id="input-${model}" placeholder="Qty">
                                    <button class="primary" style="background-color: ${activeColor};" onclick="updateWork('${activeSystemId}', '${model}', '${activePhaseId}')">Log</button>
                                </div>
                            </td>
                        </tr>
                    `;
                }
            }

            tableHTML += `</tbody></table></div></div>`;
            container.innerHTML = tableHTML;
        }

        function updateWork(system, model, phase) {
            const inputField = document.getElementById(`input-${model}`);
            const addedQty = parseFloat(inputField.value);

            if (isNaN(addedQty)) return;

            let currentVal = projectData[system][model].stages[phase] || 0;
            let newTotal = formatNum(currentVal + addedQty);
            let maxQty = formatNum(projectData[system][model].quantity);
            
            if (newTotal < 0) newTotal = 0;
            if (newTotal > maxQty) newTotal = maxQty;

            projectData[system][model].stages[phase] = newTotal;
            
            saveData();
            renderActiveTable(); 
            updateMasterChart();     
        }

        function exportReport() {
            const wb = XLSX.utils.book_new();
            
            const systemNames = { lighting: "Lighting", it: "IT", automation: "Automation", av: "AV", bms: "BMS" };

            for (let sysKey in projectData) {
                if (Object.keys(projectData[sysKey]).length === 0) continue;

                const activeConf = sysKey === 'lighting' ? phaseConfig.lighting : phaseConfig.other;

                const exportArray = Object.keys(projectData[sysKey]).map(model => {
                    const item = projectData[sysKey][model];
                    
                    let rowData = {
                        "Model Reference": model,
                        "Total Quantity": formatNum(item.quantity),
                        "Unit": item.unit
                    };

                    let overallItemProgress = 0;

                    for(let p in activeConf) {
                        let done = item.stages[p] || 0;
                        overallItemProgress += (done / item.quantity) * activeConf[p].w;
                        
                        rowData[`${activeConf[p].text} Done`] = formatNum(done);
                        rowData[`${activeConf[p].text} Rem`] = formatNum(item.quantity - done);
                    }

                    rowData["Overall Progress (%)"] = formatNum(overallItemProgress * 100) + "%";
                    return rowData;
                });

                const ws = XLSX.utils.json_to_sheet(exportArray);
                XLSX.utils.book_append_sheet(wb, ws, systemNames[sysKey]);
            }

            if(wb.SheetNames.length === 0) {
                alert("No data to export.");
                return;
            }

            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            const hours = String(now.getHours()).padStart(2, '0');
            const mins = String(now.getMinutes()).padStart(2, '0');
            const secs = String(now.getSeconds()).padStart(2, '0');
            const timeStamp = `${year}-${month}-${day}_${hours}-${mins}-${secs}`;
            XLSX.writeFile(wb, `Chronos_Master_Deployment_${timeStamp}.xlsx`);
        }

        function clearData() {
            if(confirm("Are you sure you want to delete ALL data across Lighting, IT, AV, Automation, and BMS? This cannot be undone.")) {
                projectData = { lighting: {}, it: {}, automation: {}, av: {}, bms: {} };
                localStorage.removeItem('deploymentTrackerData');
                if (overallChartInstance) {
                    overallChartInstance.destroy();
                    overallChartInstance = null;
                }
                renderUI();
            }
        }
    </script>
</body>
</html>
